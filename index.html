<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currency Converter</title>
        <link rel="stylesheet" href="currency.css" />
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="icon" href="./assets/currency.jpg" type="image/jpg">
    </head>
    <body>
    <video autoplay muted loop id="currency">
        <source src ="./assets/video.webm" type="video/webm">
    </video>

    <div class="container">
        <div class="box">
            <div>
                <h3 style="text-align: center;">Currency Converter</h3>
           <div style="flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 10px;"> 
            <div>
                <label for="amount">  <h2>Amount</h2></label>
            <input class="amount" id="amount" type="number" min = "0"  placeholder="Enter the amount">
            </div>
           <div>
            <label for="precision">  <h2>Precision</h2></label>
            <input class="precision" id="precision" type="number" min = "0" max="5" value="2" placeholder="precison..">
           </div>    
        </div>
        </div>
            <div class="box2">
                <div class="from">
                    <label for="count1">
                           <h2>From</h2> 
                    </label>
                    <select name="count1" id="count1" class="currency"></select>
                </div>

                <div class="change">
                 <i class="fa-solid fa-right-left" id="reverseBtn"></i>
                </div>

                <div class="to">
                    <label for="count2"> 
                        <h2>To</h2>  
                    </label>

                    <select name="count1" id="count2" class="currency"></select>

                </div>
            </div>

            <button id="resultBtn">Get Result</button>
            
            <div class="Resultbox hide">
                <h2>Result</h2>
                <div class="result">...</div>
            </div>

        </div>
    </div>
</body>
    <script type="module" src="currency.js"></script>

</html>
